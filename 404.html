---
layout: default
title: 404 - Page not found
---

<div class="error-page">
  <h1>404</h1>
  <p>This page doesn't exist — or maybe it never did.</p>
  <a href="{{ site.baseurl }}/" style="font-family:'Space Mono',monospace;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.1em;">&larr; Go home</a>
</div>

<script>
  // Redirect URLs with trailing slashes (Jekyll 3 migration fix)
  var url = location.href;
  if (url.substr(url.length - 1) === '/') {
    window.location = url.substr(0, url.length - 1);
  }
</script>
